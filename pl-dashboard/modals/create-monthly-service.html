<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <title>New Service Subscription - PrimeLabs</title>
    <link rel="stylesheet" href="../css/modals-create-monthly-service.css">
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <!-- Dashboard Background (Simulated) -->
    <div class="fixed inset-0 z-0 overflow-hidden opacity-40 grayscale pointer-events-none">
        <div class="p-8 space-y-6">
            <div class="flex justify-between items-center">
                <div class="h-8 w-48 bg-slate-300 dark:bg-slate-700 rounded"></div>
                <div class="h-10 w-32 bg-primary/20 rounded-lg"></div>
            </div>
            <div class="grid grid-cols-4 gap-4">
                <div class="h-32 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
                <div class="h-32 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
                <div class="h-32 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
                <div class="h-32 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
            </div>
            <div class="h-96 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
        </div>
    </div>
    <!-- Modal Overlay -->
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <!-- Modal Container -->
        <div
            class="bg-white dark:bg-slate-900 w-full max-w-[640px] rounded-xl shadow-2xl flex flex-col overflow-hidden">
            <!-- Modal Header -->
            <div class="px-8 pt-8 pb-4 flex justify-between items-start">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900 dark:text-white">New Service Subscription</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Configure a new recurring service for
                        your client.</p>
                </div>
                <button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                    <span class="material-symbols-outlined text-slate-500">close</span>
                </button>
            </div>
            <!-- Modal Content (Form) -->
            <div class="px-8 py-4 overflow-y-auto max-h-[70vh]">
                <form class="space-y-6">
                    <!-- Client Selection -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Client
                            Selection</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
                            <select
                                class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none text-slate-900 dark:text-slate-100">
                                <option disabled="" selected="" value="">Search and select client</option>
                                <option value="1">Acme Corp Solutions</option>
                                <option value="2">Global Tech Industries</option>
                                <option value="3">Starlight Ventures</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Service Tier -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Service
                                Tier</label>
                            <div class="relative">
                                <select
                                    class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none text-slate-900 dark:text-slate-100">
                                    <option disabled="" selected="" value="">Select tier</option>
                                    <option value="seo">SEO &amp; Content Premium</option>
                                    <option value="management">Monthly Management Standard</option>
                                    <option value="hosting">Hosting &amp; Cloud Basic</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                            </div>
                        </div>
                        <!-- Subscription Amount -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Subscription
                                Amount</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <span class="text-slate-500">$</span>
                                </div>
                                <input
                                    class="w-full pl-8 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none text-slate-900 dark:text-slate-100"
                                    placeholder="0.00" step="0.01" type="number" />
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Billing Cycle -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Billing
                                Cycle</label>
                            <div class="relative">
                                <select
                                    class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none text-slate-900 dark:text-slate-100">
                                    <option value="monthly">Monthly</option>
                                    <option value="quarterly">Quarterly</option>
                                    <option value="yearly">Yearly</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                            </div>
                        </div>
                        <!-- Start Date -->
                        <div class="space-y-2">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Start
                                Date</label>
                            <div class="relative">
                                <input
                                    class="w-full px-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none text-slate-900 dark:text-slate-100"
                                    type="date" />
                                <span
                                    class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-[20px]">calendar_today</span>
                            </div>
                        </div>
                    </div>
                    <!-- Auto-Renew Toggle -->
                    <div class="flex items-center justify-between py-2">
                        <div>
                            <p class="text-sm font-semibold text-slate-700 dark:text-slate-300">Auto-Renew Subscription
                            </p>
                            <p class="text-xs text-slate-500 dark:text-slate-400">Automatically generate invoice for the
                                next cycle</p>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input checked="" class="sr-only peer" type="checkbox" value="" />
                            <div
                                class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary">
                            </div>
                        </label>
                    </div>
                </form>
            </div>
            <!-- Modal Footer -->
            <div class="px-8 py-6 bg-slate-50 dark:bg-slate-800/50 flex flex-col-reverse sm:flex-row justify-end gap-3">
                <button
                    class="px-6 py-2.5 rounded-lg text-slate-700 dark:text-slate-300 font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Cancel
                </button>
                <button
                    class="px-6 py-2.5 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">
                    Create Subscription
                </button>
            </div>
        </div>
    </div>
    <script src="../js/modals-create-monthly-service.js"></script>
</body>

</html>
