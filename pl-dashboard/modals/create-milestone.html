<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Create Project Milestone - PrimeLabs</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/modals-create-milestone.css">

</head>

<body class="bg-slate-200/50 flex items-center justify-center min-h-screen p-4">
    <!-- Modal Container -->
    <div
        class="w-full max-w-[560px] bg-white dark:bg-background-dark rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <!-- Modal Header -->
        <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
            <h2 class="text-xl font-bold text-slate-900 dark:text-slate-100 flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">flag</span>
                Create Project Milestone
            </h2>
            <button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <!-- Modal Body -->
        <div class="p-6 space-y-5">
            <!-- Milestone Name -->
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Milestone Name</label>
                <input
                    class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-11 px-4 placeholder:text-slate-400"
                    placeholder="e.g. Beta Launch Integration" type="text" />
            </div>
            <!-- Grid for Date and Priority -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!-- Due Date (Simplified Date Picker View) -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Due Date</label>
                    <div class="relative">
                        <input
                            class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-11 pl-10 pr-4"
                            type="text" value="October 25, 2023" />
                        <span
                            class="material-symbols-outlined absolute left-3 top-2.5 text-slate-400 text-xl">calendar_today</span>
                    </div>
                </div>
                <!-- Priority -->
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Priority</label>
                    <div class="relative">
                        <select
                            class="w-full appearance-none rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-11 px-4">
                            <option value="high">High</option>
                            <option selected="" value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                        <span
                            class="material-symbols-outlined absolute right-3 top-2.5 text-slate-400 pointer-events-none">expand_more</span>
                    </div>
                </div>
            </div>
            <!-- Link to Phase -->
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Link to Phase</label>
                <div class="relative">
                    <select
                        class="w-full appearance-none rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-11 px-4">
                        <option value="">Select a project phase...</option>
                        <option value="discovery">Phase 1: Discovery &amp; Planning</option>
                        <option value="design">Phase 2: UI/UX Design</option>
                        <option value="development">Phase 3: Core Development</option>
                    </select>
                    <span
                        class="material-symbols-outlined absolute right-3 top-2.5 text-slate-400 pointer-events-none">link</span>
                </div>
            </div>
            <!-- Description -->
            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Description</label>
                <textarea
                    class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary p-4 placeholder:text-slate-400 resize-none"
                    placeholder="Describe the key deliverables for this milestone..." rows="4"></textarea>
            </div>
        </div>
        <!-- Modal Footer -->
        <div
            class="px-6 py-5 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800 flex items-center justify-end gap-3">
            <button
                class="px-5 py-2.5 rounded-lg text-sm font-semibold text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                Cancel
            </button>
            <button
                class="px-6 py-2.5 rounded-lg text-sm font-semibold text-white bg-primary hover:bg-blue-700 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">add_task</span>
                Create Milestone
            </button>
        </div>
    </div>
    <!-- Background Illustration Overlay (Optional for design context) -->
    <div class="fixed inset-0 -z-10 bg-gradient-to-br from-primary/10 to-transparent"></div>
    <script src="../js/modals-create-milestone.js"></script>
</body>

</html>
