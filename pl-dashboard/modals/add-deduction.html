<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Add Deduction Modal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/modals-add-deduction.css">

</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
    <!-- Modal Container -->
    <div
        class="relative w-full max-w-lg bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <!-- Header -->
        <header
            class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center size-10 rounded-lg bg-primary/10 text-primary">
                    <span class="material-symbols-outlined">payments</span>
                </div>
                <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">Add
                    Deduction</h2>
            </div>
            <button
                class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </header>
        <!-- Form Content -->
        <div class="p-6 space-y-5">
            <!-- Deduction Type -->
            <div class="flex flex-col gap-2">
                <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Deduction Type</label>
                <div class="relative">
                    <select
                        class="form-select block w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 appearance-none">
                        <option disabled="" selected="" value="">Select deduction type</option>
                        <option value="tax">Tax</option>
                        <option value="insurance">Insurance</option>
                        <option value="loan">Loan Repayment</option>
                        <option value="other">Other</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400">
                        <span class="material-symbols-outlined">expand_more</span>
                    </div>
                </div>
            </div>
            <!-- Amount -->
            <div class="flex flex-col gap-2">
                <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Amount</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400">
                        <span class="text-lg font-medium">$</span>
                    </div>
                    <input
                        class="form-input block w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 pl-10 pr-4 placeholder:text-slate-400"
                        placeholder="0.00" step="0.01" type="number" />
                </div>
            </div>
            <!-- Date -->
            <div class="flex flex-col gap-2">
                <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Effective Date</label>
                <div class="relative">
                    <input
                        class="form-input block w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary h-12 px-4 placeholder:text-slate-400"
                        type="date" />
                    <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400">
                        <span class="material-symbols-outlined">calendar_today</span>
                    </div>
                </div>
            </div>
            <!-- Description -->
            <div class="flex flex-col gap-2">
                <label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Description</label>
                <textarea
                    class="form-textarea block w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-primary p-4 placeholder:text-slate-400 resize-none"
                    placeholder="Enter details about this deduction..." rows="3"></textarea>
            </div>
        </div>
        <!-- Footer Actions -->
        <footer
            class="flex items-center justify-end gap-3 px-6 py-5 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800">
            <button
                class="px-5 py-2.5 rounded-lg text-slate-700 dark:text-slate-300 font-semibold hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                Cancel
            </button>
            <button
                class="flex items-center gap-2 px-6 py-2.5 rounded-lg bg-primary text-white font-semibold hover:bg-primary/90 transition-all shadow-md hover:shadow-lg active:scale-95">
                <span class="material-symbols-outlined text-sm">add</span>
                Add Deduction
            </button>
        </footer>
    </div>
    <script src="../js/modals-add-deduction.js"></script>
</body>

</html>
