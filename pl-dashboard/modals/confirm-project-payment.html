<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <title>Confirm Project Payment</title>
    <link rel="stylesheet" href="../css/modals-confirm-project-payment.css">
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display flex items-center justify-center min-h-screen p-4">
    <!-- Modal Container -->
    <div
        class="relative w-full max-w-[560px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <!-- Header -->
        <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-800">
            <div class="flex flex-col gap-1">
                <h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Confirm Project Payment
                </h2>
                <div class="flex items-center gap-2 text-slate-500 dark:text-slate-400 text-sm">
                    <span class="font-medium">Project:</span>
                    <span>Website Redesign</span>
                    <span class="mx-1">•</span>
                    <span class="font-medium">Client:</span>
                    <span>Acme Corp</span>
                </div>
            </div>
        </div>
        <!-- Body -->
        <div class="p-6 flex flex-col gap-6">
            <!-- Payment Type Selection -->
            <div class="flex flex-col gap-3">
                <label class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Payment
                    Type</label>
                <div class="flex h-12 w-full items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 p-1">
                    <label
                        class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-4 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-medium transition-all">
                        <span class="truncate">Full Payment</span>
                        <input checked="" class="invisible w-0" name="payment_type" type="radio" value="Full Payment" />
                    </label>
                    <label
                        class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-4 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm has-[:checked]:text-primary text-slate-600 dark:text-slate-400 text-sm font-medium transition-all">
                        <span class="truncate">Installment</span>
                        <input class="invisible w-0" name="payment_type" type="radio" value="Installment" />
                    </label>
                </div>
            </div>
            <!-- Amount Input -->
            <div class="flex flex-col gap-2">
                <label
                    class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Amount</label>
                <div class="relative flex w-full items-stretch rounded-lg group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500">
                        <span class="material-symbols-outlined text-xl">payments</span>
                    </div>
                    <input
                        class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 pl-12 pr-4 text-base font-medium"
                        type="text" value="2,500.00" />
                    <div
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 font-medium">
                        USD</div>
                </div>
                <p class="text-xs text-slate-500 dark:text-slate-400">Remaining balance for this project is $2,500.00
                </p>
            </div>
            <!-- Date and Method Row -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Payment Date -->
                <div class="flex flex-col gap-2">
                    <label
                        class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Payment
                        Date</label>
                    <div class="relative group">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 pointer-events-none">
                            <span class="material-symbols-outlined text-xl">calendar_today</span>
                        </div>
                        <input
                            class="form-input w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 pl-12 pr-4 text-base"
                            type="date" value="2023-10-27" />
                    </div>
                </div>
                <!-- Payment Method -->
                <div class="flex flex-col gap-2">
                    <label
                        class="text-slate-900 dark:text-slate-100 text-sm font-semibold uppercase tracking-wider">Payment
                        Method</label>
                    <div class="relative group">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 pointer-events-none">
                            <span class="material-symbols-outlined text-xl">account_balance_wallet</span>
                        </div>
                        <select
                            class="form-select w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 pl-12 pr-10 text-base appearance-none">
                            <option value="bank">Bank Transfer</option>
                            <option selected="" value="card">Credit Card</option>
                            <option value="paypal">PayPal</option>
                            <option value="crypto">Cryptocurrency</option>
                        </select>
                        <div
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 pointer-events-none">
                            <span class="material-symbols-outlined">expand_more</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Footer Actions -->
        <div
            class="px-6 py-6 bg-slate-50 dark:bg-slate-800/50 flex flex-col-reverse sm:flex-row justify-end gap-3 border-t border-slate-100 dark:border-slate-800">
            <button
                class="px-6 h-12 rounded-lg text-slate-700 dark:text-slate-300 font-semibold hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                Cancel
            </button>
            <button
                class="px-8 h-12 rounded-lg bg-primary text-white font-semibold hover:opacity-90 shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                <span>Confirm Payment</span>
                <span class="material-symbols-outlined text-lg">check_circle</span>
            </button>
        </div>
    </div>
    <script src="../js/modals-confirm-project-payment.js"></script>
</body>

</html>
