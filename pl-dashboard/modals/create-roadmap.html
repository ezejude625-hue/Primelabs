<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <title>PrimeLabs - Create Project Roadmap</title>
</head>

<body class="bg-background-light font-display text-slate-900 antialiased">
    <!-- Modal Overlay -->
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
        <!-- Modal Container -->
        <div class="bg-white w-full max-w-[800px] max-h-[90vh] overflow-y-auto rounded-xl shadow-2xl flex flex-col">
            <!-- Modal Header -->
            <div
                class="px-8 py-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900">Create Project Roadmap Phase</h2>
                    <p class="text-slate-500 text-sm mt-1">Define the timeline and objectives for this project phase.
                    </p>
                </div>
                <button class="text-slate-400 hover:text-slate-600 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <!-- Modal Body -->
            <div class="p-8 space-y-8">
                <!-- Section 1: Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700">Phase Name</label>
                        <input
                            class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-slate-900 placeholder:text-slate-400"
                            placeholder="e.g., Discovery, Development, Launch" type="text" />
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700">Status</label>
                        <select
                            class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-slate-900 bg-white">
                            <option>Planning</option>
                            <option>In Progress</option>
                            <option>Completed</option>
                        </select>
                    </div>
                </div>
                <!-- Section 2: Duration (Calendar Picker Style) -->
                <div class="space-y-4">
                    <label class="text-sm font-semibold text-slate-700 block">Duration</label>
                    <div class="bg-slate-50 rounded-xl p-6 border border-slate-100">
                        <div class="flex flex-col lg:flex-row gap-8 items-start justify-center">
                            <!-- Date Range Controls -->
                            <div class="flex-1 w-full space-y-4">
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="flex flex-col gap-1.5">
                                        <span
                                            class="text-[10px] uppercase tracking-wider font-bold text-slate-400">Start
                                            Date</span>
                                        <div
                                            class="flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-lg text-primary font-medium">
                                            <span class="material-symbols-outlined text-sm">calendar_today</span>
                                            Oct 5, 2023
                                        </div>
                                    </div>
                                    <div class="flex flex-col gap-1.5">
                                        <span class="text-[10px] uppercase tracking-wider font-bold text-slate-400">End
                                            Date</span>
                                        <div
                                            class="flex items-center gap-2 px-3 py-2 bg-white border border-slate-200 rounded-lg text-primary font-medium">
                                            <span class="material-symbols-outlined text-sm">calendar_today</span>
                                            Oct 30, 2023
                                        </div>
                                    </div>
                                </div>
                                <!-- Mini Calendar UI -->
                                <div class="bg-white p-4 rounded-lg border border-slate-200">
                                    <div class="flex items-center justify-between mb-4">
                                        <button class="p-1 hover:bg-slate-100 rounded text-slate-600"><span
                                                class="material-symbols-outlined">chevron_left</span></button>
                                        <span class="font-bold text-slate-800 text-sm">October 2023</span>
                                        <button class="p-1 hover:bg-slate-100 rounded text-slate-600"><span
                                                class="material-symbols-outlined">chevron_right</span></button>
                                    </div>
                                    <div class="grid grid-cols-7 text-center text-[11px] font-bold text-slate-400 mb-2">
                                        <div>S</div>
                                        <div>M</div>
                                        <div>T</div>
                                        <div>W</div>
                                        <div>T</div>
                                        <div>F</div>
                                        <div>S</div>
                                    </div>
                                    <div class="grid grid-cols-7 gap-y-1">
                                        <!-- Empty cells for padding -->
                                        <div class="h-8"></div>
                                        <div class="h-8"></div>
                                        <div class="h-8"></div>
                                        <div class="h-8"></div>
                                        <button
                                            class="h-8 w-full flex items-center justify-center text-sm rounded-l-full bg-primary/10 text-primary font-bold border-l border-y border-primary/20">5</button>
                                        <button
                                            class="h-8 w-full flex items-center justify-center text-sm bg-primary/10 text-primary font-bold border-y border-primary/20">6</button>
                                        <button
                                            class="h-8 w-full flex items-center justify-center text-sm bg-primary/10 text-primary font-bold border-y border-primary/20">7</button>
                                        <button
                                            class="h-8 w-full flex items-center justify-center text-sm bg-primary/10 text-primary font-bold border-y border-primary/20">8</button>
                                        <button
                                            class="h-8 w-full flex items-center justify-center text-sm bg-primary/10 text-primary font-bold border-y border-primary/20">9</button>
                                        <button
                                            class="h-8 w-full flex items-center justify-center text-sm bg-primary/10 text-primary font-bold border-y border-primary/20">10</button>
                                        <div class="col-span-7 py-2 text-[10px] text-center text-slate-400">... and 20
                                            more days selected ...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Section 3: Objectives & Deliverables -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700">Phase Objective/Goal</label>
                        <textarea
                            class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary min-h-[120px] p-4 text-slate-900 placeholder:text-slate-400 resize-none"
                            placeholder="Describe the primary goal of this phase..."></textarea>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700">Key Deliverables</label>
                        <textarea
                            class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary min-h-[120px] p-4 text-slate-900 placeholder:text-slate-400 resize-none"
                            placeholder="List the main outputs (e.g., UI Kit, Tech Specs, API Docs)"></textarea>
                    </div>
                </div>
                <!-- Section 4: Advanced Options -->
                <div class="pt-4 border-t border-slate-100">
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-semibold text-slate-700">Link to Milestone <span
                                    class="text-slate-400 font-normal">(Optional)</span></label>
                            <span
                                class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase font-bold">Premium
                                Feature</span>
                        </div>
                        <select
                            class="w-full rounded-lg border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary h-12 px-4 text-slate-900 bg-white">
                            <option value="">None selected</option>
                            <option>Q4 Product Launch</option>
                            <option>Beta Release v1.2</option>
                            <option>Infrastructure Migration</option>
                        </select>
                    </div>
                </div>
            </div>
            <!-- Modal Footer -->
            <div
                class="px-8 py-6 border-t border-slate-100 flex flex-col sm:flex-row items-center justify-end gap-3 sticky bottom-0 bg-white">
                <button
                    class="w-full sm:w-auto px-6 py-3 rounded-lg border border-slate-200 text-slate-600 font-semibold hover:bg-slate-50 transition-colors">
                    Cancel
                </button>
                <button
                    class="w-full sm:w-auto px-6 py-3 rounded-lg bg-primary text-white font-semibold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">add</span>
                    Add Phase to Roadmap
                </button>
            </div>
        </div>
    </div>
</body>

</html>
