<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <title>PrimeLabs - Add New Expense</title>
    <link rel="stylesheet" href="../css/modals-create-exp.css">
</head>

<body
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
    <!-- Background Dashboard (Dimmed) -->
    <div class="fixed inset-0 z-0 opacity-40 blur-sm pointer-events-none select-none">
        <div class="layout-container flex h-full flex-col">
            <header class="flex items-center justify-between border-b border-primary/10 bg-white px-10 py-3">
                <div class="flex items-center gap-4">
                    <div class="text-primary"><span class="material-symbols-outlined text-3xl">rocket_launch</span>
                    </div>
                    <h2 class="text-lg font-bold tracking-tight">PrimeLabs</h2>
                </div>
                <div class="flex items-center gap-6">
                    <div class="h-10 w-64 bg-slate-200 rounded-lg"></div>
                    <div class="flex gap-2">
                        <div class="size-10 bg-slate-200 rounded-lg"></div>
                        <div class="size-10 bg-slate-200 rounded-lg"></div>
                    </div>
                </div>
            </header>
            <main class="flex-1 p-10 flex gap-8">
                <aside class="w-64 space-y-4">
                    <div class="h-10 bg-slate-200 rounded-lg w-full"></div>
                    <div class="h-10 bg-primary/10 rounded-lg w-full"></div>
                    <div class="h-10 bg-slate-200 rounded-lg w-full"></div>
                    <div class="h-10 bg-slate-200 rounded-lg w-full"></div>
                </aside>
                <section class="flex-1 space-y-6">
                    <div class="h-32 bg-white rounded-xl shadow-sm"></div>
                    <div class="grid grid-cols-3 gap-6">
                        <div class="h-40 bg-white rounded-xl shadow-sm"></div>
                        <div class="h-40 bg-white rounded-xl shadow-sm"></div>
                        <div class="h-40 bg-white rounded-xl shadow-sm"></div>
                    </div>
                    <div class="h-96 bg-white rounded-xl shadow-sm"></div>
                </section>
            </main>
        </div>
    </div>
    <!-- Modal Backdrop -->
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
        <!-- Modal Container -->
        <div
            class="bg-white dark:bg-background-dark w-full max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[90vh] overflow-hidden border border-primary/10">
            <!-- Modal Header -->
            <div class="px-8 py-6 border-b border-primary/5 flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Add New Expense</h2>
                    <p class="text-sm text-slate-500">Record a business expenditure for your records.</p>
                </div>
                <button class="text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <!-- Modal Body (Scrollable) -->
            <div class="flex-1 overflow-y-auto px-8 py-6 space-y-6">
                <!-- Basic Info -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Expense Name
                            / Description</label>
                        <input
                            class="w-full rounded-lg border-primary/20 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary text-slate-900 dark:text-slate-100 h-12"
                            placeholder="e.g. AWS Production Infrastructure" type="text" />
                    </div>
                    <div>
                        <label
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Category</label>
                        <select
                            class="w-full rounded-lg border-primary/20 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary h-12">
                            <option>Infrastructure</option>
                            <option>Marketing</option>
                            <option>Staff Salary</option>
                            <option>Office Supplies</option>
                            <option>Travel &amp; Meals</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Transaction
                            Date</label>
                        <div class="relative">
                            <input
                                class="w-full rounded-lg border-primary/20 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary h-12 pl-4"
                                type="date" />
                        </div>
                    </div>
                </div>
                <!-- Financials -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label
                            class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Amount</label>
                        <div class="flex">
                            <select
                                class="rounded-l-lg border-r-0 border-primary/20 bg-slate-100 dark:bg-slate-700 text-sm font-medium focus:ring-0 focus:border-primary/20">
                                <option>USD</option>
                                <option>EUR</option>
                                <option>GBP</option>
                                <option>JPY</option>
                            </select>
                            <input
                                class="flex-1 rounded-r-lg border-primary/20 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary h-12"
                                placeholder="0.00" type="number" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Link to
                            Project / Dept.</label>
                        <select
                            class="w-full rounded-lg border-primary/20 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary h-12">
                            <option>Select Assignment</option>
                            <option>Project Alpha (R&amp;D)</option>
                            <option>Project Phoenix (Sales)</option>
                            <option>Marketing Department</option>
                            <option>IT Operations</option>
                        </select>
                    </div>
                </div>
                <!-- Upload Section -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Attach
                        Receipt</label>
                    <div
                        class="border-2 border-dashed border-primary/30 rounded-xl p-8 bg-primary/5 hover:bg-primary/10 transition-colors flex flex-col items-center justify-center cursor-pointer">
                        <span class="material-symbols-outlined text-primary text-4xl mb-2">cloud_upload</span>
                        <p class="text-sm text-slate-600 font-medium">Click to upload or drag and drop</p>
                        <p class="text-xs text-slate-400 mt-1">PDF, JPG, or PNG (Max. 10MB)</p>
                    </div>
                </div>
                <!-- Recurring Toggle -->
                <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-primary/5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary">event_repeat</span>
                            <div>
                                <p class="text-sm font-semibold">Recurring Expense</p>
                                <p class="text-xs text-slate-500">Automatically repeat this transaction</p>
                            </div>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input class="sr-only peer" type="checkbox" value="" />
                            <div
                                class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary">
                            </div>
                        </label>
                    </div>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input checked="" class="text-primary focus:ring-primary border-primary/20" name="freq"
                                type="radio" />
                            <span class="text-sm text-slate-600 dark:text-slate-400">Monthly</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input class="text-primary focus:ring-primary border-primary/20" name="freq" type="radio" />
                            <span class="text-sm text-slate-600 dark:text-slate-400">Yearly</span>
                        </label>
                    </div>
                </div>
            </div>
            <!-- Modal Footer -->
            <div class="px-8 py-6 border-t border-primary/5 bg-slate-50/50 dark:bg-slate-800/30 flex justify-end gap-3">
                <button
                    class="px-6 py-2.5 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-200 dark:text-slate-300 dark:hover:bg-slate-700 transition-colors border border-slate-300 dark:border-slate-600">
                    Cancel
                </button>
                <button
                    class="px-6 py-2.5 rounded-lg text-sm font-semibold text-white bg-primary hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-base">save</span>
                    Save Expense
                </button>
            </div>
        </div>
    </div>
    <script src="../js/modals-create-exp.js"></script>
</body>

</html>
