<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <title>Make Payment - Marcus Wright</title>
    <link rel="stylesheet" href="../css/modals-conform-staff-payement.css">
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
    <!-- Modal Container -->
    <div
        class="relative w-full max-w-[560px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <!-- Header -->
        <header class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center gap-3">
                <div class="flex items-center justify-center size-8 rounded-lg bg-primary/10 text-primary">
                    <span class="material-symbols-outlined text-[20px]">payments</span>
                </div>
                <h2 class="text-xl font-bold tracking-tight">Make Payment</h2>
            </div>
            <button
                class="flex items-center justify-center size-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500">
                <span class="material-symbols-outlined">close</span>
            </button>
        </header>
        <!-- Body -->
        <div class="p-6 space-y-6">
            <!-- Staff Summary Card -->
            <div
                class="flex items-center gap-4 p-4 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800">
                <div class="size-16 rounded-full bg-cover bg-center border-2 border-white dark:border-slate-700 shadow-sm"
                    data-alt="Professional headshot of Marcus Wright smiling"
                    style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCSqLFCEYZM6VcPJEeEcLNCgcfmrmuT9poGhq6wOq-Nxt_KHJegRFI3SHpTYZSJgzADAY9iDmSR2gObOWCbXdJ5z-s_az8dgVolZ_IbDfG1xjpsFUsrQBzsciugsdGWcD4WZCsYSybMFQRcZi13pbiJmijjRnBRaWoYdayF0IWCkhAeLO5uLqI_691goZz1aBzAvyAkzxHLwZRY31CTq41ipE8aSS8k9rnsAgkbxOTuHadp1o8tVp59Kj9xHIJEutNLjz1PrfMyIrr3')">
                </div>
                <div class="flex flex-col">
                    <h3 class="text-lg font-bold">Marcus Wright</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm">Senior Staff Member • ID: #8829</p>
                </div>
            </div>
            <form class="space-y-5">
                <!-- Payment Type & Date Row -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Payment Type</label>
                        <div class="relative">
                            <select
                                class="appearance-none w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm outline-none">
                                <option disabled="" selected="" value="">Select type</option>
                                <option value="salary">Salary</option>
                                <option value="bonus">Bonus</option>
                                <option value="commission">Commission</option>
                            </select>
                            <span
                                class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">expand_more</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Payment Date</label>
                        <input
                            class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm outline-none"
                            type="date" value="2023-11-24" />
                    </div>
                </div>
                <!-- Amount Field -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Amount</label>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
                        <input
                            class="w-full pl-8 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm outline-none font-medium"
                            placeholder="0.00" step="0.01" type="number" />
                    </div>
                </div>
                <!-- Payment Method Toggle -->
                <div class="flex flex-col gap-3">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Payment Method</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="cursor-pointer group">
                            <input checked="" class="peer hidden" name="method" type="radio" />
                            <div
                                class="flex flex-col items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary transition-all">
                                <span class="material-symbols-outlined">account_balance</span>
                                <span class="text-xs font-medium">Bank</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input class="peer hidden" name="method" type="radio" />
                            <div
                                class="flex flex-col items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary transition-all">
                                <span class="material-symbols-outlined">payments</span>
                                <span class="text-xs font-medium">PayPal</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input class="peer hidden" name="method" type="radio" />
                            <div
                                class="flex flex-col items-center justify-center gap-2 p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:text-primary transition-all">
                                <span class="material-symbols-outlined">wallet</span>
                                <span class="text-xs font-medium">Cash</span>
                            </div>
                        </label>
                    </div>
                </div>
                <!-- Memo/Notes -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Note (Optional)</label>
                    <textarea
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary focus:border-primary transition-all text-sm outline-none resize-none"
                        placeholder="Add a description..." rows="2"></textarea>
                </div>
            </form>
        </div>
        <!-- Footer -->
        <footer
            class="p-6 bg-slate-50 dark:bg-slate-800/30 border-t border-slate-100 dark:border-slate-800 flex flex-col gap-3">
            <div class="flex items-center justify-between text-sm mb-2">
                <span class="text-slate-500">Processing Fee</span>
                <span class="font-medium">$0.00</span>
            </div>
            <div class="flex items-center gap-3">
                <button
                    class="flex-1 px-6 py-3 rounded-lg bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 font-bold text-sm transition-colors">
                    Cancel
                </button>
                <button
                    class="flex-[2] px-6 py-3 rounded-lg bg-primary hover:bg-primary/90 text-white font-bold text-sm shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">check_circle</span>
                    Confirm Payment
                </button>
            </div>
            <p class="text-center text-[11px] text-slate-400 mt-2">
                By clicking Confirm, you agree to the payment processing terms and conditions.
            </p>
        </footer>
    </div>
    <script src="../js/modals-conform-staff-payement.js"></script>
</body>

</html>
